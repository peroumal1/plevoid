name = "plevoid-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Static frontend served alongside the worker.
# Worker handles /api/* and SPA rewrites; everything else falls through to assets.
[assets]
directory = "../frontend"
binding = "ASSETS"

# Uncomment and set after obtaining a key from song.link
# [vars]
# ODESLI_API_KEY = "your-key-here"

[[d1_databases]]
binding = "DB"
database_name = "plevoid-db"
database_id = "00000000-0000-0000-0000-000000000000" # replace after: wrangler d1 create plevoid-db

[[queues.producers]]
queue = "plevoid-odesli-queue"
binding = "ODESLI_QUEUE"

[[queues.consumers]]
queue = "plevoid-odesli-queue"
max_batch_size = 10   # at most 10 Odesli calls per batch
max_batch_timeout = 60  # ≤10 Odesli calls/min in production (use 5 locally)
max_concurrency = 1   # one batch at a time
