<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plevoid</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    [hidden] { display: none !important; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1.5rem; color: #111; }
    .logo { display: block; width: 100%; margin-bottom: 2rem; }

    /* Create form */
    form { display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.65rem 0.9rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: border-color 0.15s; }
    input[type=text]:focus { border-color: #111; }
    .btn-primary { padding: 0.65rem 1.3rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 6px; background: #111; color: #fff; font-weight: 500; transition: opacity 0.15s; display: flex; align-items: center; gap: 0.5rem; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Result */
    #result { margin-top: 2rem; padding: 1.25rem; background: #f7f7f7; border-radius: 8px; border: 1px solid #e8e8e8; }
    #result h2 { margin: 0 0 0.25rem; font-size: 1.05rem; }
    #result p { margin: 0 0 0.75rem; font-size: 0.9rem; color: #555; }
    .url-row { display: flex; align-items: center; gap: 0.5rem; }
    .url-row code { flex: 1; font-size: 0.78rem; overflow-wrap: anywhere; background: #ebebeb; padding: 0.4rem 0.6rem; border-radius: 4px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #888; padding: 0.35rem 0.4rem; font-size: 0.95rem; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .btn-icon:hover { color: #111; background: #e8e8e8; }
    .btn-icon.danger:hover { color: #c00; background: #fdecea; }
    .result-links { margin-top: 1rem; display: flex; gap: 1.25rem; }
    .result-links a { color: #111; font-size: 0.9rem; display: flex; align-items: center; gap: 0.4rem; text-decoration: none; }
    .result-links a:hover { text-decoration: underline; }

    #error { margin-top: 1rem; color: #c00; font-size: 0.9rem; }

    /* Your playlists */
    #your-playlists { margin-top: 3rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
    #your-playlists h2 { font-size: 0.75rem; color: #999; margin: 0 0 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .pl-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #f0f0f0; }
    .pl-item-title { flex: 1; font-weight: 500; color: #111; text-decoration: none; font-size: 0.95rem; }
    .pl-item-title:hover { text-decoration: underline; }
    .pl-item-pub { font-size: 0.8rem; color: #999; text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .pl-item-pub:hover { color: #111; }
  </style>
</head>
<body>
  <img src="/logo.svg" alt="Plevoid — anonymous playlists" class="logo">

  <form id="create-form">
    <input type="text" id="title" placeholder="Playlist title" required autocomplete="off" maxlength="100">
    <button type="submit" id="submit-btn" class="btn-primary">
      <i class="fa-solid fa-plus"></i> Create
    </button>
  </form>

  <div id="result" hidden>
    <h2>Playlist created!</h2>
    <p>Save your edit link — use it to edit from another device:</p>
    <div class="url-row">
      <code id="edit-url"></code>
      <button id="copy-btn" class="btn-icon" title="Copy edit link">
        <i class="fa-regular fa-copy"></i>
      </button>
    </div>
    <div class="result-links">
      <a id="go-edit" href="#"><i class="fa-solid fa-pen"></i> Edit playlist</a>
      <a id="go-public" href="#"><i class="fa-solid fa-eye"></i> Public view</a>
    </div>
  </div>

  <div id="error" hidden></div>

  <section id="your-playlists" hidden>
    <h2>Your playlists</h2>
    <div id="playlist-list"></div>
  </section>

  <script>
    function getStoredPlaylists() {
      try { return JSON.parse(localStorage.getItem('plevoid_playlists') || '[]') } catch { return [] }
    }
    function savePlaylist(id, token, title) {
      const list = getStoredPlaylists().filter(p => p.id !== id)
      list.unshift({ id, token, title, createdAt: Date.now() })
      localStorage.setItem('plevoid_playlists', JSON.stringify(list))
    }
    function removeStoredPlaylist(id) {
      localStorage.setItem('plevoid_playlists',
        JSON.stringify(getStoredPlaylists().filter(p => p.id !== id)))
    }

    function renderStoredPlaylists() {
      const list = getStoredPlaylists()
      const section = document.getElementById('your-playlists')
      const container = document.getElementById('playlist-list')
      if (!list.length) { section.hidden = true; return }

      container.innerHTML = ''
      for (const pl of list) {
        const row = document.createElement('div')
        row.className = 'pl-item'

        const titleLink = document.createElement('a')
        titleLink.className = 'pl-item-title'
        titleLink.href = `/edit/${pl.id}`
        titleLink.textContent = pl.title || pl.id

        const pubLink = document.createElement('a')
        pubLink.className = 'pl-item-pub'
        pubLink.href = `/p/${pl.id}`
        pubLink.target = '_blank'
        pubLink.rel = 'noopener'
        pubLink.innerHTML = '<i class="fa-solid fa-eye"></i> Public'

        const removeBtn = document.createElement('button')
        removeBtn.className = 'btn-icon danger'
        removeBtn.title = 'Remove from list'
        removeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>'
        removeBtn.addEventListener('click', () => {
          removeStoredPlaylist(pl.id)
          renderStoredPlaylists()
        })

        row.append(titleLink, pubLink, removeBtn)
        container.appendChild(row)
      }
      section.hidden = false
    }

    const form = document.getElementById('create-form')
    const submitBtn = document.getElementById('submit-btn')
    const resultEl = document.getElementById('result')
    const errorEl = document.getElementById('error')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      submitBtn.disabled = true
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Creating…'
      errorEl.hidden = true

      const title = document.getElementById('title').value.trim()
      try {
        const res = await fetch('/api/playlists', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Failed to create playlist')

        savePlaylist(data.id, data.edit_token, title)
        document.getElementById('edit-url').textContent = data.edit_url
        document.getElementById('go-edit').href = `/edit/${data.id}`
        document.getElementById('go-public').href = data.public_url
        form.hidden = true
        resultEl.hidden = false
        renderStoredPlaylists()
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.hidden = false
        submitBtn.disabled = false
        submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Create'
      }
    })

    document.getElementById('copy-btn').addEventListener('click', () => {
      const btn = document.getElementById('copy-btn')
      navigator.clipboard.writeText(document.getElementById('edit-url').textContent).then(() => {
        btn.innerHTML = '<i class="fa-solid fa-check"></i>'
        btn.style.color = '#2a9d5c'
        setTimeout(() => {
          btn.innerHTML = '<i class="fa-regular fa-copy"></i>'
          btn.style.color = ''
        }, 2000)
      })
    })

    renderStoredPlaylists()
    fetch('/api/version').then(r => r.json()).then(d => {
      const el = document.getElementById('ver')
      if (el) el.textContent = `v${d.version}`
    }).catch(() => {})
  </script>
  <p style="margin-top:3rem;font-size:0.8rem;color:#bbb;text-align:center">
    <span id="ver"></span>
  </p>
</body>
</html>
