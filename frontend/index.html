<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plevoid</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p.tagline { color: #666; margin-top: 0; }
    form { display: flex; gap: 0.5rem; margin-top: 2rem; }
    input[type=text] { flex: 1; padding: 0.6rem 0.8rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #111; color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { margin-top: 2rem; padding: 1rem; background: #f5f5f5; border-radius: 6px; }
    #result h2 { margin-top: 0; font-size: 1.1rem; }
    .url-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
    .url-row code { flex: 1; font-size: 0.8rem; overflow-wrap: anywhere; background: #e8e8e8; padding: 0.3rem 0.5rem; border-radius: 3px; }
    .url-row button { font-size: 0.8rem; padding: 0.3rem 0.6rem; background: #555; }
    .links { margin-top: 1rem; display: flex; gap: 1rem; }
    .links a { color: #111; }
    #error { margin-top: 1rem; color: #c00; }
  </style>
</head>
<body>
  <h1>Plevoid</h1>
  <p class="tagline">Create a shareable music playlist. No account needed.</p>

  <form id="create-form">
    <input type="text" id="title" placeholder="Playlist title" required autocomplete="off" maxlength="100">
    <button type="submit" id="submit-btn">Create</button>
  </form>

  <div id="result" hidden>
    <h2>Playlist created!</h2>
    <p><strong>Save your edit link</strong> — it won't be shown again:</p>
    <div class="url-row">
      <code id="edit-url"></code>
      <button id="copy-btn">Copy</button>
    </div>
    <div class="links">
      <a id="go-edit" href="#">Edit playlist →</a>
      <a id="go-public" href="#">Public view →</a>
    </div>
  </div>

  <div id="error" hidden></div>

  <script>
    const form = document.getElementById('create-form')
    const submitBtn = document.getElementById('submit-btn')
    const resultEl = document.getElementById('result')
    const errorEl = document.getElementById('error')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      submitBtn.disabled = true
      submitBtn.textContent = 'Creating…'
      errorEl.hidden = true

      try {
        const res = await fetch('/api/playlists', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: document.getElementById('title').value.trim() }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Failed to create playlist')

        document.getElementById('edit-url').textContent = data.edit_url
        document.getElementById('go-edit').href = data.edit_url
        document.getElementById('go-public').href = data.public_url
        form.hidden = true
        resultEl.hidden = false
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.hidden = false
        submitBtn.disabled = false
        submitBtn.textContent = 'Create'
      }
    })

    document.getElementById('copy-btn').addEventListener('click', () => {
      const btn = document.getElementById('copy-btn')
      navigator.clipboard.writeText(document.getElementById('edit-url').textContent).then(() => {
        btn.textContent = 'Copied!'
        setTimeout(() => { btn.textContent = 'Copy' }, 2000)
      })
    })
  </script>
</body>
</html>
