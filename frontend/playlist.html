<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plevoid</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    [hidden] { display: none !important; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 4rem auto; padding: 0 1.5rem; color: #111; }

    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .nav a, .nav button { font-size: 0.85rem; color: #888; text-decoration: none; display: flex; align-items: center; gap: 0.35rem; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .nav a:hover, .nav button:hover { color: #111; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }

    h1 { font-size: 1.8rem; margin: 0 0 1.5rem; }

    .track { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 0; border-bottom: 1px solid #eee; }
    .track img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { color: #666; font-size: 0.88rem; margin-top: 0.1rem; }
    .platform-links { display: flex; gap: 0.6rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .platform-links a { color: #888; font-size: 1.1rem; text-decoration: none; transition: color 0.15s; }
    .platform-links a:hover { color: #111; }
    .platform-links a.songlink { font-size: 0.75rem; font-weight: 500; color: #aaa; display: flex; align-items: center; gap: 0.2rem; }
    .platform-links a.songlink:hover { color: #555; }
    .track-raw a { word-break: break-all; color: #555; font-size: 0.88rem; }
    #error { color: #c00; }
    .empty { color: #999; font-size: 0.95rem; margin-top: 1rem; }
    .empty a { color: #555; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/"><i class="fa-solid fa-arrow-left"></i> Plevoid</a>
    <div class="nav-right">
      <button id="share-btn" hidden title="Share playlist"><i class="fa-solid fa-share-nodes"></i> Share</button>
      <a id="edit-link" href="#" hidden><i class="fa-solid fa-pen"></i> Edit</a>
    </div>
  </div>
  <h1 id="title">Loading…</h1>
  <div id="tracks"></div>
  <div id="error" hidden></div>

  <script>
    function getStoredPlaylists() {
      try { return JSON.parse(localStorage.getItem('plevoid_playlists') || '[]') } catch { return [] }
    }
    function getStoredToken(id) {
      return getStoredPlaylists().find(p => p.id === id)?.token ?? null
    }

    const id = window.location.pathname.split('/').filter(Boolean).pop()
    const storedToken = getStoredToken(id)
    let loadedData = null

    if (storedToken) {
      const el = document.getElementById('edit-link')
      el.href = `/edit/${id}`
      el.hidden = false
    }

    // --- Share ---
    function formatShareText(data) {
      const lines = data.tracks.map(t => {
        if (t.odesli_data) {
          const entity = t.odesli_data.entitiesByUniqueId[t.odesli_data.entityUniqueId] ?? {}
          const title = entity.title ?? 'Unknown'
          const artist = entity.artistName ? ` — ${entity.artistName}` : ''
          return `• ${title}${artist}`
        }
        return `• ${t.url_original}`
      })
      return `🎵 ${data.title}\n\n${lines.join('\n')}\n\n${window.location.href}`
    }

    document.getElementById('share-btn').addEventListener('click', async () => {
      if (!loadedData) return
      const btn = document.getElementById('share-btn')
      const text = formatShareText(loadedData)
      try {
        if (navigator.share) {
          await navigator.share({ title: loadedData.title, text, url: window.location.href })
        } else {
          await navigator.clipboard.writeText(text)
          btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!'
          setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-share-nodes"></i> Share' }, 2000)
        }
      } catch { /* user cancelled share sheet */ }
    })

    function safeUrl(url) {
      try {
        const u = new URL(url)
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#'
      } catch { return '#' }
    }

    // FA brand icon class per platform; null = use text abbreviation
    const PLATFORM_ICONS = {
      spotify:      'fa-brands fa-spotify',
      appleMusic:   'fa-brands fa-apple',
      itunes:       'fa-brands fa-apple',        // iTunes purchase — same Apple icon
      youtube:      'fa-brands fa-youtube',
      youtubeMusic: 'fa-brands fa-youtube',
      deezer:       'fa-brands fa-deezer',
      soundcloud:   'fa-brands fa-soundcloud',
      amazonMusic:  'fa-brands fa-amazon',
      bandcamp:     'fa-brands fa-bandcamp',
      tidal:        null,
      napster:      null,
      anghami:      null,
      boomplay:     null,
      pandora:      null,
      audius:       null,
      yandex:       null,
    }

    const PLATFORM_LABELS = {
      spotify: 'Spotify', appleMusic: 'Apple Music', itunes: 'iTunes',
      youtube: 'YouTube', youtubeMusic: 'YouTube Music',
      deezer: 'Deezer', soundcloud: 'SoundCloud', amazonMusic: 'Amazon Music',
      bandcamp: 'Bandcamp', tidal: 'Tidal', napster: 'Napster',
      anghami: 'Anghami', boomplay: 'Boomplay', pandora: 'Pandora',
      audius: 'Audius', yandex: 'Yandex Music',
    }

    async function load() {
      try {
        const res = await fetch(`/api/playlists/${id}`)
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Not found')

        loadedData = data
        document.title = `${data.title} — Plevoid`
        document.getElementById('title').textContent = data.title
        document.getElementById('share-btn').hidden = false

        const container = document.getElementById('tracks')
        if (!data.tracks.length) {
          container.innerHTML = storedToken
            ? `<p class="empty">No tracks yet. <a href="/edit/${id}">Add some →</a></p>`
            : '<p class="empty">No tracks yet.</p>'
          return
        }
        for (const track of data.tracks) container.appendChild(renderTrack(track))
      } catch (err) {
        document.getElementById('title').textContent = 'Error'
        const el = document.getElementById('error')
        el.textContent = err.message
        el.hidden = false
      }
    }

    function renderTrack(track) {
      const div = document.createElement('div')
      div.className = 'track'
      const od = track.odesli_data

      if (od) {
        const entity = od.entitiesByUniqueId[od.entityUniqueId] ?? {}

        if (entity.thumbnailUrl) {
          const img = document.createElement('img')
          img.src = safeUrl(entity.thumbnailUrl)
          img.alt = ''
          div.appendChild(img)
        }

        const info = document.createElement('div')
        info.className = 'track-info'

        const titleEl = document.createElement('div')
        titleEl.className = 'track-title'
        titleEl.textContent = entity.title ?? 'Unknown'

        const artistEl = document.createElement('div')
        artistEl.className = 'track-artist'
        artistEl.textContent = entity.artistName ?? ''

        const linksEl = document.createElement('div')
        linksEl.className = 'platform-links'

        // song.link universal link first
        if (od.pageUrl) {
          const a = document.createElement('a')
          a.href = safeUrl(od.pageUrl)
          a.target = '_blank'
          a.rel = 'noopener'
          a.className = 'songlink'
          a.title = 'Open on song.link'
          a.innerHTML = '<i class="fa-solid fa-link"></i> song.link'
          linksEl.appendChild(a)
        }

        // Platform icons
        for (const [platform, { url }] of Object.entries(od.linksByPlatform ?? {})) {
          if (platform === 'amazonStore') continue // skip purchase link
          const iconClass = PLATFORM_ICONS[platform]
          if (!iconClass) continue // skip platforms without a brand icon; song.link covers them
          const label = PLATFORM_LABELS[platform] ?? platform
          const a = document.createElement('a')
          a.href = safeUrl(url)
          a.target = '_blank'
          a.rel = 'noopener'
          a.title = label
          a.innerHTML = `<i class="${iconClass}"></i>`
          linksEl.appendChild(a)
        }

        info.append(titleEl, artistEl, linksEl)
        div.appendChild(info)
      } else {
        div.className += ' track-raw'
        const info = document.createElement('div')
        info.className = 'track-info'
        const a = document.createElement('a')
        a.href = safeUrl(track.url_original)
        a.target = '_blank'
        a.rel = 'noopener'
        a.textContent = track.url_original
        info.appendChild(a)
        div.appendChild(info)
      }

      return div
    }

    load()
  </script>
</body>
</html>
